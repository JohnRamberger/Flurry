name: Build

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Version for a stable release (e.g. 1.0.0). Leave empty for a plain build."
        required: false
        type: string

permissions:
  contents: write

jobs:
  # Decide the version BEFORE building so the exact release tag can be baked
  # into the loader UI (previously the build ran before the tag existed and
  # git-describe showed the prior tag).
  version:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      prerelease: ${{ steps.ver.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # tags, for the git-describe fallback
      - name: Determine version
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            version="${{ github.event.inputs.version }}"
            if ! echo "$version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Version must look like 1.0.0 (got: $version)"
              exit 1
            fi
            if gh release view "v$version" >/dev/null 2>&1; then
              echo "::error::Release v$version already exists"
              exit 1
            fi
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            base=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 \
              --json tagName --jq '.[0].tagName // "v0.0.0"' | sed 's/^v//')
            n=$(gh api "repos/$GH_REPO/git/matching-refs/tags/v$base." \
              --jq "[.[].ref | ltrimstr(\"refs/tags/v$base.\") | select(test(\"^[0-9]+$\")) | tonumber] | max // 0")
            echo "tag=v$base.$((n + 1))" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            # Branch/PR build that never becomes a release: describe only.
            echo "tag=$(git describe --tags --always 2>/dev/null || echo dev)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version
    runs-on: ubuntu-latest
    env:
      DEVKITPRO: ${{ github.workspace }}/.dkp
      DEVKITARM: ${{ github.workspace }}/.dkp/devkitARM
    steps:
      - uses: actions/checkout@v4

      # Flurry requires the legacy 2017 toolchain: devkitARM r46 + libctru 1.2.1,
      # plus armv6k builds of libjpeg-turbo/zlib (from the HzMod dependency bundle).
      # See README.md "Build Instructions".
      - name: Cache legacy devkitARM toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: .dkp
          key: dkp-devkitarm-r46-libctru-1.2.1-hzdeps-2017-v1

      - name: Download legacy devkitARM toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$DEVKITPRO"
          cd "$RUNNER_TEMP"

          curl -fsSLO "https://wii.leseratte10.de/devkitPro/devkitARM/r46%20%282017%29/devkitARM_r46-x86_64-linux.tar.bz2"
          curl -fsSLO "https://wii.leseratte10.de/devkitPro/libctru/2017/libctru-1.2.1.tar.bz2"
          curl -fsSLo hzdeps.zip "https://chainswordcs.com/dl/hzmod_dependencies_2017_v1.zip"

          tar xjf devkitARM_r46-x86_64-linux.tar.bz2 -C "$DEVKITPRO"
          mkdir -p "$DEVKITPRO/libctru"
          tar xjf libctru-1.2.1.tar.bz2 -C "$DEVKITPRO/libctru"

          # Only the (host-independent) armv6k portlibs are needed from the bundle;
          # its devkitARM/libctru copies are Windows builds and already covered above.
          unzip -q hzdeps.zip 'dependencies for compiling HzMod (2017)/portlibs/*'
          mkdir -p "$DEVKITPRO/portlibs"
          cp -r "dependencies for compiling HzMod (2017)/portlibs/armv6k" "$DEVKITPRO/portlibs/"

      - name: Download makerom and bannertool
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$DEVKITPRO/tools/bin"
          cd "$RUNNER_TEMP"

          makerom_url=$(gh api repos/3DSGuy/Project_CTR/releases --paginate \
            --jq '[.[].assets[] | select(.name | test("makerom.*ubuntu.*\\.zip$"))][0].browser_download_url')
          curl -fsSLo makerom.zip "$makerom_url"
          unzip -o makerom.zip -d makerom-extract
          find makerom-extract -type f -name 'makerom*' -exec install -m755 {} "$DEVKITPRO/tools/bin/makerom" \;

          bannertool_url=$(gh api repos/Epicpkmn11/bannertool/releases --paginate \
            --jq '[.[].assets[] | select(.name | test("\\.zip$"))][0].browser_download_url')
          curl -fsSLo bannertool.zip "$bannertool_url"
          unzip -o bannertool.zip -d bannertool-extract
          find bannertool-extract -type f -path '*linux-x86_64*' -name 'bannertool*' \
            -exec install -m755 {} "$DEVKITPRO/tools/bin/bannertool" \;

          makerom -help 2>&1 | head -3 || true
          bannertool 2>&1 | head -3 || true
        # PATH additions live in the cached toolchain dir so cache hits skip this step.

      - name: Add toolchain to PATH
        run: |
          echo "$DEVKITARM/bin" >> "$GITHUB_PATH"
          echo "$DEVKITPRO/tools/bin" >> "$GITHUB_PATH"

      - name: Build Flurry
        run: make

      - name: Build FlurryLoad
        run: make -C HzLoad FLURRY_VERSION="${{ needs.version.outputs.tag }}"

      - name: Build FlurryLoad_HIMEM
        run: make -C HzLoad HIMEM=1 FLURRY_VERSION="${{ needs.version.outputs.tag }}"

      - name: Upload CIAs
        uses: actions/upload-artifact@v4
        with:
          name: Flurry-${{ github.sha }}
          path: |
            Flurry.cia
            HzLoad/FlurryLoad.cia
            HzLoad/FlurryLoad_HIMEM.cia
          if-no-files-found: error

  # Versioning scheme:
  #   - Manual dispatch with a version input (e.g. 1.0.0) publishes stable release v1.0.0.
  #   - Every push to main publishes prerelease v<latest-stable>.N (v1.0.0.1, v1.0.0.2, ...),
  #     restarting from .1 after each stable release. Before any stable exists, base is 0.0.0.
  release:
    needs: [version, build]
    if: >-
      (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    concurrency:
      group: release
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download CIAs
        uses: actions/download-artifact@v4
        with:
          name: Flurry-${{ github.sha }}

      # Tag was decided by the `version` job (so the build could bake it in).
      # Rare race: queued pushes may have computed the same prerelease number
      # and an earlier run already released it — bump past it (the baked
      # display version is then one behind for that build; harmless).
      - name: Determine version
        id: ver
        run: |
          set -euo pipefail
          tag="${{ needs.version.outputs.tag }}"
          prerelease="${{ needs.version.outputs.prerelease }}"
          if [ "$prerelease" = "true" ] && gh release view "$tag" >/dev/null 2>&1; then
            echo "::warning::$tag already released by a concurrent run; recomputing"
            base=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 \
              --json tagName --jq '.[0].tagName // "v0.0.0"' | sed 's/^v//')
            n=$(gh api "repos/$GH_REPO/git/matching-refs/tags/v$base." \
              --jq "[.[].ref | ltrimstr(\"refs/tags/v$base.\") | select(test(\"^[0-9]+$\")) | tonumber] | max // 0")
            tag="v$base.$((n + 1))"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Create release
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          flags=()
          if [ "${{ steps.ver.outputs.prerelease }}" = "true" ]; then
            flags+=(--prerelease)
          fi
          gh release create "$tag" \
            --target "${{ github.sha }}" \
            --title "${tag#v}" \
            --generate-notes \
            "${flags[@]}" \
            Flurry.cia \
            HzLoad/FlurryLoad.cia \
            HzLoad/FlurryLoad_HIMEM.cia

      # Keep exactly one PUBLISHED prerelease. GitHub's release list is
      # name-ordered (v0.1.1.9 outranks v0.1.1.10) and Universal-Updater's
      # downloadRelease takes the first matching list entry, so stale
      # nightlies would shadow new ones forever. Older prereleases are
      # demoted to DRAFTS: invisible to the API list, but tags and artifacts
      # stay available for rollback (GitHub UI / gh release download).
      # (Same name-order trap applies to stables one day: prefer v0.2.0
      # over v0.1.10 when the time comes.)
      - name: Demote older prereleases to drafts
        if: steps.ver.outputs.prerelease == 'true'
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          gh release list --limit 100 --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease) | .tagName' \
            | { grep -vx "$tag" || true; } \
            | while read -r t; do
                echo "Demoting stale prerelease $t to draft"
                gh release edit "$t" --draft=true
              done

      # Re-stamp the UniStore with the current release tags so Universal-Updater
      # can display versions and detect updates. Pushed back to main with
      # [skip ci] so it does not trigger another build/release cycle.
      - name: Stamp UniStore versions
        run: |
          set -euo pipefail
          stable=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 \
            --json tagName --jq '.[0].tagName // "unreleased"')
          nightly=$(gh release list --exclude-drafts --limit 1 \
            --json tagName --jq '.[0].tagName // "unreleased"')

          # revision defaults to the current Unix time (monotonic) inside the generator
          python3 tools/gen_unistore.py --stable "$stable" --nightly "$nightly"

          if git diff --quiet -- flurry.unistore; then
            echo "UniStore already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flurry.unistore
          git commit -m "chore: stamp UniStore (stable=$stable, nightly=$nightly) [skip ci]"
          git push origin HEAD:main
